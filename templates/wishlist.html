{% extends 'base.html' %}

{% block content %}

<div class="max-w-7xl mx-auto px-6 mt-12 mb-20">

    <h1 class="text-5xl font-bold mb-10">
        My Wishlist ❤️
    </h1>

    <div class="grid md:grid-cols-3 gap-8">

        {% for wish in wishlist_items %}

        <div class="bg-white rounded-3xl overflow-hidden shadow-lg">

            <img
            src="{{ wish.item.image.url }}"
            class="w-full h-[250px] object-cover">

            <div class="p-6">

                <div class="flex justify-between items-center">

                    <h2 class="text-2xl font-bold">

                        {{ wish.item.name }}

                    </h2>

                    <span class="bg-green-100 text-green-700 px-3 py-1 rounded-full">

                        ⭐ {{ wish.item.rating }}

                    </span>

                </div>

                <p class="text-gray-500 mt-3">

                    ₹{{ wish.item.price }}

                </p>

                <a href="/add-to-cart/{{ wish.item.id }}/"
                   class="block text-center bg-red-500 hover:bg-red-600 text-white py-3 rounded-2xl mt-5 font-semibold">

                    Add To Cart

                </a>

                <a href="/wishlist/remove/{{ wish.id }}/"
                   class="block text-center bg-black hover:bg-gray-800 text-white py-3 rounded-2xl mt-3 font-semibold">

                    Remove

                </a>

            </div>

        </div>

        {% empty %}

        <div class="col-span-3 text-center">

            <h2 class="text-3xl font-bold text-gray-500">

                Wishlist Empty 😔

            </h2>

        </div>

        {% endfor %}

    </div>

</div>

{% endblock %}
